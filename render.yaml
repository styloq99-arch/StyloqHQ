services:
  - type: web
    name: styloq-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn 'app:create_app()'
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: CORS_ORIGIN
        fromService:
          type: static
          name: styloq-frontend
          envVar: RENDER_EXTERNAL_URL

  - type: static
    name: styloq-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: NODE_VERSION
        value: ~18
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: styloq-backend
          envVar: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
